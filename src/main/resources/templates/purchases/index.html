<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список покупок</title>
    <link href="/css/bootstrap/bootstrap.css" rel="stylesheet">
    <link href="/css/purchases.css" rel="stylesheet">
    <style>

    </style>
</head>
<body class="bg-light">
<div class="card mb-4 shadow-sm">
    <div class="card-body">
        <form th:action="@{/purchases}" method="get" class="row g-3 align-items-end">
            <input type="hidden" name="page" value="0">

            <div class="col-md-3">
                <label class="form-label small fw-bold">Период (с - по)</label>
                <div class="input-group input-group-sm">
                    <input type="date" name="startDate" class="form-control" th:value="${param.startDate}" placeholder="От">
                    <input type="date" name="endDate" class="form-control" th:value="${param.endDate}" placeholder="До">
                </div>
            </div>

            <div class="col-md-3 position-relative">
                <label class="form-label small fw-bold">Категория</label>
                <input type="text" name="category" class="form-control form-control-sm b-cat"
                       th:value="${param.category}" placeholder="Поиск по категории..."
                       oninput="handleCategoryInput(this)" autocomplete="off">
                <ul class="category-dropdown"></ul>
            </div>

            <div class="col-md-4">
                <label class="form-label small fw-bold">Комментарий</label>
                <input type="text" name="comment" class="form-control form-control-sm"
                       th:value="${param.comment}" placeholder="Фраза в комментарии...">
            </div>

            <div class="col-md-2 d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm flex-grow-1">Найти</button>
                <a th:href="@{/purchases}" class="btn btn-outline-secondary btn-sm">Сброс</a>
            </div>
        </form>
    </div>
</div>

<div class="container mt-5">
    <!--div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Список покупок для: <span th:text="${userName}" class="text-primary">Пользователь</span></h2>
        <span class="badge bg-secondary" th:text="'Страница ' + (${currentPage} + 1) + ' из ' + ${totalPages}"></span>
    </div-->

    <div class="mb-4">
        <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#batchAddModal">
            Добавить записи
        </button>
    </div>

    <div class="mb-4 d-inline-block">
        <button type="button" class="btn btn-outline-info shadow-sm" onclick="openReportsModal()">
            Собрать отчет
        </button>
    </div>

    <div class="modal fade" id="reportsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title">Аналитика расходов</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3" id="reportTabs" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="absolute-tab" data-bs-toggle="tab" data-bs-target="#absoluteReport" type="button">За период</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="relative-tab" data-bs-toggle="tab" data-bs-target="#relativeReport" type="button">По страницам</button>
                        </li>
                    </ul>

                    <div class="tab-content border p-3 rounded bg-light">
                        <div class="tab-pane fade show active" id="absoluteReport">
                            <div class="row g-2 align-items-end mb-3">
                                <div class="col">
                                    <label class="small fw-bold">Начало</label>
                                    <input type="date" id="absStartDate" class="form-control form-control-sm">
                                </div>
                                <div class="col">
                                    <label class="small fw-bold">Конец</label>
                                    <input type="date" id="absEndDate" class="form-control form-control-sm">
                                </div>
                                <div class="col-auto">
                                    <button class="btn btn-primary btn-sm" onclick="loadAbsoluteReport()">Показать</button>
                                </div>
                            </div>
                            <div id="absoluteResult"></div>
                        </div>

                        <div class="tab-pane fade" id="relativeReport">
                            <div class="d-flex align-items-center justify-content-between mb-3">
                                <div class="d-flex flex-column">
                                    <div class="d-flex align-items-center gap-2 mb-1">
                                        <label class="small fw-bold mb-0">Якорь:</label>
                                        <input type="date" id="relAnchorDate" class="form-control form-control-sm" style="width: 150px;">
                                    </div>
                                    <!--div id="relPeriodLabel" class="text-muted small fw-bold"></div-->
                                </div>
                                <div class="pagination-controls d-flex align-items-center gap-3">
                                    <button class="btn btn-outline-secondary btn-sm" onclick="changeRelPage(1)">← Пред.</button>
                                    <!--span class="fw-bold">Стр: <span id="relPageLabel">0</span></span-->
                                    <span class="fw-bold" id="relPeriodLabel"></span>
                                    <button class="btn btn-outline-secondary btn-sm" onclick="changeRelPage(-1)">След. →</button>
                                </div>
                            </div>
                            <div id="relativeResult"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="batchAddModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Добавление покупок пачкой</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body custom-modal-body">
                    <table class="table align-middle">
                        <thead class="table-light sticky-top">
                        <tr>
                            <th style="width: 15%;">Сумма</th>
                            <th style="width: 20%;">Дата</th>
                            <th style="width: 25%;">Категория</th>
                            <th>Комментарий</th>
                            <th style="width: 50px;"></th>
                        </tr>
                        </thead>
                        <tbody id="batchTableBody"></tbody>
                    </table>
                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="addBatchRow()">+ Строка</button>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-success" onclick="submitBatch()">Сохранить всё</button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-hover table-bordered bg-white align-middle">
            <thead class="table-dark">
            <tr>
                <th style="width: 15%;">Сумма</th>
                <th style="width: 15%;">Дата</th>
                <th style="width: 20%;">Категория</th>
                <th>Комментарий</th>
                <th class="text-center" style="width: 200px;">Действие</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${purchases}" th:data-id="${p.id}">
                <td>
                    <input type="number" step="0.01" class="table-input row-field"
                           th:value="${p.amt % 1 == 0 ? #numbers.formatDecimal(p.amt, 0, 0) : p.amt}"
                           th:data-original="${p.amt % 1 == 0 ? #numbers.formatDecimal(p.amt, 0, 0) : p.amt}"
                           oninput="checkRowChanges(this)">
                </td>
                <td>
                    <input type="date" class="table-input row-field" th:value="${p.date}"
                           th:data-original="${p.date}" oninput="checkRowChanges(this)">
                </td>
                <td class="position-relative">
                    <input type="text" class="table-input row-field b-cat"
                           th:value="${p.category}"
                           th:data-original="${p.category}"
                           oninput="handleCategoryInput(this)"
                           onfocus="handleCategoryInput(this)">
                    <ul class="category-dropdown"></ul>
                </td>
                <td>
                    <input type="text" class="table-input row-field" th:value="${p.comments}"
                           th:data-original="${p.comments}" oninput="checkRowChanges(this)">
                </td>
                <td class="text-center">
                    <div class="d-flex justify-content-center gap-2">
                        <button th:id="'apply-' + ${p.id}" class="btn btn-success btn-sm d-none"
                                th:onclick="'saveRow(' + ${p.id} + ')'">Применить</button>
                        <button th:id="'reset-' + ${p.id}" class="btn btn-outline-secondary btn-sm d-none"
                                th:onclick="'resetRow(' + ${p.id} + ')'">Вернуть</button>

                        <button type="button" class="btn btn-outline-danger btn-sm"
                                th:onclick="'deleteRow(' + ${p.id} + ')'">Удалить</button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center mt-4">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/purchases(page=${currentPage - 1})}">&laquo;</a>
            </li>

            <li class="page-item" th:classappend="${currentPage == 0} ? 'active'"><a class="page-link" th:href="@{/purchases(page=0)}">1</a></li>
            <li class="page-item disabled" th:if="${currentPage > 2}"><span class="page-link">...</span></li>

            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <li class="page-item" th:if="${i > 0 && i < totalPages - 3 && i >= currentPage - 1 && i <= currentPage + 1}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/purchases(page=${i}, startDate=${param.startDate}, endDate=${param.endDate}, category=${param.category}, comment=${param.comment})}" th:text="${i + 1}"></a>
                </li>
            </th:block>

            <li class="page-item disabled" th:if="${currentPage < totalPages - 4}"><span class="page-link">...</span></li>
            <th:block th:each="i : ${#numbers.sequence(totalPages - 3, totalPages - 1)}">
                <li class="page-item" th:if="${i > 0}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/purchases(page=${i}, startDate=${param.startDate}, endDate=${param.endDate}, category=${param.category}, comment=${param.comment})}" th:text="${i + 1}"></a>
                </li>
            </th:block>

            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/purchases(page=${currentPage + 1}, startDate=${param.startDate}, endDate=${param.endDate}, category=${param.category}, comment=${param.comment})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/purchases.js"></script>

</body>
</html>
