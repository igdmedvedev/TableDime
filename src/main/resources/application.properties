spring.application.name=Purchases

# Data Source
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Configuration Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.show_sql=true

# For HTTP-methods PUT, PATCH, DELETE
spring.mvc.hiddenmethod.filter.enabled=true

#Autoupdate templates (if set to false template updates can be done on the fly by pressing Ctrl+F9)
spring.thymeleaf.cache=true

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG